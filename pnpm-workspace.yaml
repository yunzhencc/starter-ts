catalogMode: prefer
ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade

trustPolicyExclude:
  - tinyexec@1.2.2

catalogs:
  cli:
    '@antfu/eslint-config': ^9.0.0
    '@antfu/ni': ^30.1.0
    '@commitlint/cli': ^21.0.1
    '@commitlint/config-conventional': ^21.0.1
    '@commitlint/types': ^21.0.1
    bumpp: ^11.1.0
    eslint: ^10.4.0
    lint-staged: ^17.0.5
    publint: ^0.3.21
    rimraf: ^6.1.3
    simple-git-hooks: ^2.13.1
    tsdown: ^0.22.0
    tsx: ^4.22.3
    unrun: ^0.3.0
  core:
    es-toolkit: ^1.47.0
  test:
    tsdown-stale-guard: ^0.1.2
    tsnapi: ^0.3.3
    vitest: ^4.1.7
  types:
    '@types/node': ^25.9.1
allowBuilds:
  esbuild: true
  simple-git-hooks: true
